<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net;
    style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
    font-src https://fonts.gstatic.com;
    connect-src 'self' https://*.supabase.co;
    img-src 'self' data: blob:;
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
  ">
  <title>Portal – Timetable Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Work Sans", sans-serif;
      background: #f0ebe1;
      color: #1e2622;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
    }

    h1 {
      font-family: "Crimson Pro", serif;
      font-size: 2.25rem;
      font-weight: 700;
      color: #2a5c4e;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1rem;
      color: #4a5c54;
    }

    .badge {
      display: inline-block;
      background: rgba(42, 92, 78, 0.10);
      color: #2a5c4e;
      border: 1px solid rgba(42, 92, 78, 0.20);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
    }

    .btn-signout {
      margin-top: 1.5rem;
      padding: 0.6rem 1.25rem;
      font-family: "Work Sans", sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: #4a5c54;
      background: none;
      border: 1.5px solid #c8c1b4;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.18s, color 0.18s;
    }

    .btn-signout:hover {
      border-color: #2a5c4e;
      color: #2a5c4e;
    }
  </style>
</head>
<body>
  <span class="badge">Work in Progress</span>
  <h1>Portal</h1>
  <p>This page is coming soon.</p>
  <button class="btn-signout" id="btn-signout">Sign out</button>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/require-auth.js"></script>
  <script>
    document.getElementById('btn-signout').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.replace('auth.html');
    });
  </script>
</body>
</html>
