<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    frame-ancestors is intentionally omitted — it is ignored in <meta> CSP
    and must be set as an HTTP response header instead.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net;
    style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
    font-src https://fonts.gstatic.com;
    connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net;
    img-src 'self' data: blob:;
    base-uri 'self';
    form-action 'self';
  ">
  <title>Portal – Timetable Planner</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2a5c4e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/portal.css">
  <!-- Apply saved theme tokens before first paint — avoids colour flash -->
  <script src="js/theme-engine.js"></script>
</head>
<body>

  <!-- Ambient background -->
  <div class="portal-bg" aria-hidden="true">
    <div class="portal-orb portal-orb--green"></div>
    <div class="portal-orb portal-orb--gold"></div>
  </div>

  <!-- ── Header ──────────────────────────────────────────── -->
  <div class="app-shell">
    <header class="app-header">

      <a class="app-brand" href="portal.html">
        <svg class="app-brand-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8"  y1="2" x2="8"  y2="6"/>
          <line x1="3"  y1="10" x2="21" y2="10"/>
        </svg>
        Timetable <strong>Planner</strong>
      </a>

      <nav class="app-header-center" aria-label="Main">
        <a href="portal.html" class="app-header-link app-header-link--active" aria-current="page">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <rect x="3"  y="3"  width="7" height="7"/>
            <rect x="14" y="3"  width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3"  y="14" width="7" height="7"/>
          </svg>
          <span class="nav-label">My Timetables</span>
          <span class="nav-count" id="tt-count"></span>
        </a>
        <a href="config.html" class="app-header-link">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span class="nav-label">Settings</span>
        </a>
      </nav>

      <div class="app-header-end">
        <span class="app-user-name" id="user-name" aria-hidden="true"></span>
        <div class="app-avatar" id="user-avatar" aria-hidden="true"></div>
        <button class="app-btn-signout" id="btn-signout" onclick="window.signOut()">Sign out</button>
      </div>

    </header>
  </div><!-- /.app-shell -->

  <!-- ── Welcome banner ──────────────────────────────────── -->
  <section class="portal-welcome" aria-label="Welcome">
    <div class="portal-welcome-inner">
      <div class="portal-welcome-text">
        <h1 class="portal-greeting" id="portal-greeting"></h1>
        <p class="portal-sub" id="portal-sub"></p>
      </div>
      <button class="btn btn-primary portal-cta" id="btn-create">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5"  y1="12" x2="19" y2="12"/>
        </svg>
        New Timetable
      </button>
    </div>
  </section>

  <!-- ── Main content ────────────────────────────────────── -->
  <main class="portal-main">

    <div class="portal-section-header">
      <h2 class="portal-section-title">My Timetables</h2>
    </div>

    <div class="timetable-grid" id="grid-owned">
      <p class="grid-loading">Loading…</p>
    </div>

  </main>

  <!-- ── Create Timetable Modal ──────────────────────────── -->
  <div class="modal-overlay" id="modal-create" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="portal-modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">New Timetable</h2>
        <button class="btn-close-modal" id="btn-modal-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="form-error" id="create-error" role="alert"></div>

        <div class="form-group">
          <label for="input-tt-name">Name</label>
          <input
            type="text"
            id="input-tt-name"
            placeholder="e.g. Term 2 — Year 3"
            maxlength="120"
            autocomplete="off"
          >
          <span class="field-error" id="error-tt-name" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="input-tt-desc">
            Description
            <span class="label-optional">(optional)</span>
          </label>
          <textarea
            id="input-tt-desc"
            rows="3"
            placeholder="A short description…"
            maxlength="500"
          ></textarea>
        </div>

        <div class="modal-actions">
          <button class="btn btn-ghost" id="btn-modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="btn-modal-confirm">
            <span class="btn-label">Create</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Members / Invites Modal ────────────────────────────── -->
  <div class="modal-overlay" id="modal-members" hidden role="dialog"
       aria-modal="true" aria-labelledby="members-modal-title">
    <div class="portal-modal portal-modal--members">
      <div class="modal-header">
        <h2 class="modal-title" id="members-modal-title">Members</h2>
        <button class="btn-close-modal" id="btn-members-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body">

        <!-- Invite form -->
        <div class="members-invite-row">
          <input
            type="email"
            id="input-invite-email"
            class="members-email-input"
            placeholder="Invite by email address…"
            autocomplete="off"
            maxlength="254"
          >
          <button class="btn btn-primary" id="btn-send-invite" style="width:100%">
            <span class="btn-label">Send Invite</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>
        <div class="form-error members-invite-error" id="members-invite-error" role="alert"></div>

        <!-- Pending invites -->
        <div class="members-section">
          <p class="members-section-label">Pending invites</p>
          <ul class="members-list" id="list-pending-invites">
            <li class="members-empty">No pending invites.</li>
          </ul>
        </div>

        <!-- Current members -->
        <div class="members-section">
          <p class="members-section-label">Members</p>
          <ul class="members-list" id="list-members">
            <li class="members-empty">No members yet.</li>
          </ul>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/user-config.js"></script>
  <script src="js/portal.js"></script>
</body>
</html>
