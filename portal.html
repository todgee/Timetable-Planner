<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!--
    frame-ancestors is intentionally omitted — it is ignored in <meta> CSP
    and must be set as an HTTP response header instead.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net;
    style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
    font-src https://fonts.gstatic.com;
    connect-src 'self' https://*.supabase.co https://cdn.jsdelivr.net;
    img-src 'self' data: blob:;
    base-uri 'self';
    form-action 'self';
  ">
  <title>Portal – Timetable Planner</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2a5c4e">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/portal.css">
</head>
<body>

  <!-- Ambient background -->
  <div class="portal-bg" aria-hidden="true">
    <div class="portal-orb portal-orb--green"></div>
    <div class="portal-orb portal-orb--gold"></div>
  </div>

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="portal-header">
    <a class="portal-brand" href="portal.html">Timetable <strong>Planner</strong></a>
    <div class="portal-header-right">
      <span class="portal-user-name" id="user-name" aria-hidden="true"></span>
      <div class="portal-avatar" id="user-avatar" aria-hidden="true"></div>
      <button class="btn-signout" id="btn-signout">Sign out</button>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────── -->
  <main class="portal-main">

    <!-- Hero -->
    <section class="portal-hero">
      <h1 class="portal-greeting" id="portal-greeting"></h1>
      <button class="btn btn-primary portal-cta" id="btn-create">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        Create New Timetable
      </button>
    </section>

    <!-- My Timetables -->
    <section class="portal-section">
      <h2 class="portal-section-title">My Timetables</h2>
      <div class="timetable-grid" id="grid-owned">
        <p class="grid-loading">Loading…</p>
      </div>
    </section>


  </main>

  <!-- ── Create Timetable Modal ──────────────────────────── -->
  <div class="modal-overlay" id="modal-create" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="portal-modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">New Timetable</h2>
        <button class="btn-close-modal" id="btn-modal-close" aria-label="Close">&#x2715;</button>
      </div>
      <div class="modal-body">
        <div class="form-error" id="create-error" role="alert"></div>

        <div class="form-group">
          <label for="input-tt-name">Name</label>
          <input
            type="text"
            id="input-tt-name"
            placeholder="e.g. Term 2 — Year 3"
            maxlength="120"
            autocomplete="off"
          >
          <span class="field-error" id="error-tt-name" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="input-tt-desc">
            Description
            <span class="label-optional">(optional)</span>
          </label>
          <textarea
            id="input-tt-desc"
            rows="3"
            placeholder="A short description…"
            maxlength="500"
          ></textarea>
        </div>

        <div class="modal-actions">
          <button class="btn btn-ghost" id="btn-modal-cancel">Cancel</button>
          <button class="btn btn-primary" id="btn-modal-confirm">
            <span class="btn-label">Create</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/portal.js"></script>
</body>
</html>
