<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal – Timetable Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Work Sans", sans-serif;
      background: #f0ebe1;
      color: #1e2622;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
    }

    h1 {
      font-family: "Crimson Pro", serif;
      font-size: 2.25rem;
      font-weight: 700;
      color: #2a5c4e;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1rem;
      color: #4a5c54;
    }

    .badge {
      display: inline-block;
      background: rgba(42, 92, 78, 0.10);
      color: #2a5c4e;
      border: 1px solid rgba(42, 92, 78, 0.20);
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
    }
  </style>
</head>
<body>
  <span class="badge">Work in Progress</span>
  <h1>Portal</h1>
  <p>This page is coming soon.</p>
</body>
</html>
