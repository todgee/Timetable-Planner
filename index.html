<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timetable Planner</title>
  <!-- Redirect: authenticated → portal, unauthenticated → login (via supabase-client.js guard) -->
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    // authReady resolves when a session exists; the guard in supabase-client.js
    // handles the unauthenticated case by redirecting to login.html.
    window.authReady.then(() => window.location.replace('portal.html')).catch(() => {});
  </script>
</body>
</html>
