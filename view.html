<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timetable Planner - View</title>

    <!-- PWA Configuration -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2c5f4f" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css" />

    <style>
        /* =====================================================
           VIEW PAGE — DARK THEME
           Same visual language as admin.html / setup.html
           ===================================================== */

        /* --- Background & page layer -------------------------------- */
        body {
            background: #0c1812;
        }

        .view-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .view-bg::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -15%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(44, 95, 79, 0.3) 0%, transparent 70%);
            animation: viewOrb1 13s ease-in-out infinite;
            will-change: transform;
            transform: translateZ(0);
        }

        .view-bg::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 55%;
            height: 55%;
            background: radial-gradient(ellipse, rgba(212, 165, 116, 0.17) 0%, transparent 70%);
            animation: viewOrb2 16s ease-in-out infinite;
            will-change: transform;
            transform: translateZ(0);
        }

        @keyframes viewOrb1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50%       { transform: translate(3%, 4%) scale(1.05); }
        }

        @keyframes viewOrb2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50%       { transform: translate(-3%, -3%) scale(1.04); }
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* --- Header ------------------------------------------------- */
        header {
            border-bottom-color: rgba(255, 255, 255, 0.08);
        }

        header h1 {
            color: rgba(255, 255, 255, 0.92);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.35);
        }

        /* --- Timetable header panel --------------------------------- */
        .timetable-header {
            background: rgba(13, 24, 18, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .panel-title {
            color: rgba(255, 255, 255, 0.88);
        }

        /* --- Day selector ------------------------------------------ */
        .day-btn {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.55);
            font-family: "Work Sans", sans-serif;
        }

        .day-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.22);
            color: rgba(255, 255, 255, 0.88);
            transform: translateY(-2px);
        }

        .day-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 4px 16px rgba(44, 95, 79, 0.4);
        }

        /* --- View controls ----------------------------------------- */
        .view-controls-group {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.09);
            box-shadow: none;
        }

        .view-control-btn {
            color: rgba(255, 255, 255, 0.45);
        }

        .view-control-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.88);
        }

        .view-control-btn:disabled {
            color: rgba(255, 255, 255, 0.15);
            background: transparent;
        }

        .view-controls-zoom-value {
            color: rgba(255, 255, 255, 0.65);
        }

        /* --- Timetable wrapper & table ------------------------------ */
        .timetable-wrapper {
            background: rgba(13, 24, 18, 0.88);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
            contain: paint;
            will-change: scroll-position;
        }

        .timetable {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .timetable-row:nth-child(even) {
            background: rgba(255, 255, 255, 0.02);
        }

        .time-cell {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.65);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .roster-cell {
            border-color: rgba(255, 255, 255, 0.07);
            cursor: default;
        }

        /* --- Break rows -------------------------------------------- */
        .break-row--recess .break-cell {
            background: rgba(96, 213, 245, 0.07);
            color: #60d5f5;
        }

        .break-row--lunch .break-cell {
            background: rgba(212, 165, 116, 0.09);
            color: var(--accent);
        }

        .break-row--break .break-cell {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.28);
        }

        .break-row .time-cell {
            color: rgba(255, 255, 255, 0.38);
        }

        /* --- Counters section --------------------------------------- */
        .counters-section {
            background: rgba(13, 24, 18, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .counter-tabs {
            border-bottom-color: rgba(255, 255, 255, 0.08);
        }

        .counter-tab {
            color: rgba(255, 255, 255, 0.3);
            font-family: "Work Sans", sans-serif;
        }

        .counter-tab:hover {
            color: rgba(255, 255, 255, 0.65);
        }

        .counter-tab.active {
            color: rgba(255, 255, 255, 0.88);
            border-bottom-color: var(--accent);
        }

        .counter-item {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
        }

        /* view.js renders .counter-label (not .counter-class) */
        .counter-label {
            color: rgba(255, 255, 255, 0.72);
            font-weight: 500;
        }

        .counter-value {
            color: var(--accent);
        }

        /* --- Empty state -------------------------------------------- */
        .empty-state,
        .empty-state p {
            color: rgba(255, 255, 255, 0.25);
        }

        /* --- Fullscreen mode --------------------------------------- */
        .timetable-section.timetable-fullscreen {
            background: #0c1812;
        }

        /* --- Print: restore light theme for readability ------------ */
        @media print {
            body        { background: white; }
            .view-bg    { display: none; }
            .timetable-header,
            .timetable-wrapper,
            .counters-section {
                background: white;
                border-color: #e0e0e0;
                box-shadow: none;
                backdrop-filter: none;
            }
            .time-cell  { background: white; color: #2c5f4f; }
            header h1   { color: #2c5f4f; }
            .day-btn    { border-color: #ddd; color: #333; }
            .day-btn.active { background: #2c5f4f; color: white; }
        }
    </style>

    <!-- Shared utilities -->
    <script src="js/shared.js"></script>
    <script src="theme-loader.js"></script>
  </head>
  <body>
    <!-- Animated orb background -->
    <div class="view-bg" aria-hidden="true"></div>

    <div class="container">
      <header>
        <h1>Timetable Planner</h1>
        <p class="subtitle">Read-only view</p>
        <div style="margin-top: 0.75rem;">
          <a href="admin.html" class="btn btn-secondary btn-icon" style="text-decoration:none;">Back to Editor</a>
        </div>
      </header>

      <!-- Timetable Section -->
      <div class="timetable-section">
        <div class="timetable-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem">
          <h2 class="panel-title" style="border: none; padding: 0; margin: 0">
            <span class="panel-icon">📅</span>
            Weekly Timetable
          </h2>
          <div class="timetable-actions" style="display: flex; gap: 1rem; flex-wrap: wrap">
            <button class="btn btn-secondary btn-icon" onclick="window.print()">
              Print Timetable
            </button>
          </div>
        </div>

        <!-- Day Selector + View Controls row -->
        <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap; margin-bottom:1rem;">
          <div class="day-selector" id="daySelector" style="margin-bottom:0; flex:1; min-width:0;">
            <button class="day-btn active" data-day="monday" onclick="switchDay('monday')">Monday</button>
            <button class="day-btn" data-day="tuesday" onclick="switchDay('tuesday')">Tuesday</button>
            <button class="day-btn" data-day="wednesday" onclick="switchDay('wednesday')">Wednesday</button>
            <button class="day-btn" data-day="thursday" onclick="switchDay('thursday')">Thursday</button>
            <button class="day-btn" data-day="friday" onclick="switchDay('friday')">Friday</button>
          </div>

          <!-- View Controls -->
          <div class="view-controls" id="viewControls" style="margin-bottom:0; flex-shrink:0;">
            <div class="view-controls-group">
              <button type="button" class="view-control-btn" id="scrollLeftBtn" title="Scroll left" aria-label="Scroll timetable left">&#x2039;</button>
              <button type="button" class="view-control-btn" id="scrollRightBtn" title="Scroll right" aria-label="Scroll timetable right">&#x203A;</button>
            </div>
            <div class="view-controls-group view-controls-zoom">
              <button type="button" class="view-control-btn" id="zoomOutBtn" title="Zoom out" aria-label="Zoom out">&minus;</button>
              <span class="view-controls-zoom-value" id="zoomValue" title="Click to reset zoom">100%</span>
              <button type="button" class="view-control-btn" id="zoomInBtn" title="Zoom in" aria-label="Zoom in">+</button>
            </div>
            <div class="view-controls-group">
              <button type="button" class="view-control-btn" id="fullscreenBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
                <span class="fullscreen-icon-enter">⛶</span>
                <span class="fullscreen-icon-exit">✕</span>
              </button>
            </div>
          </div>
        </div><!-- end day+controls row -->

        <div class="timetable-wrapper" id="timetableWrapper">
          <div class="timetable-zoom" id="timetableZoom">
            <div id="timetableContainer">
              <div class="empty-state" style="padding: 4rem 2rem">
                <div class="empty-state-icon">📋</div>
                <p>Loading timetable...</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Counters Section -->
        <div class="counters-section" id="countersSection">
          <div class="counter-tabs">
            <button class="counter-tab active" onclick="switchCounterTab('day')">
              <span id="currentDayLabel">Today</span>
            </button>
            <button class="counter-tab" onclick="switchCounterTab('week')">Full Week</button>
          </div>

          <div class="counter-content active" id="dayCounters">
            <div class="counter-grid" id="dayCounterGrid"></div>
          </div>

          <div class="counter-content" id="weekCounters">
            <div class="counter-grid" id="weekCounterGrid"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- View JavaScript -->
    <script src="js/view.js"></script>
    <script src="js/view-controls.js"></script>
  </body>
</html>
