<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timetable Planner – View</title>

    <!-- PWA Configuration -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2c5f4f" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="css/view.css" />

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-client.js"></script>

    <!-- Shared utilities -->
    <script src="js/shared.js"></script>
    <script src="js/theme-engine.js"></script>
    <script src="js/user-config.js"></script>
  </head>
  <body style="visibility:hidden">

    <!-- Animated orb background -->
    <div class="view-bg" aria-hidden="true"></div>

    <!-- ── App shell: brand header + controls (sticky, light) ── -->
    <div class="app-shell">

      <!-- Brand header -->
      <header class="app-header">
        <a class="app-brand" href="portal.html">
          <svg class="app-brand-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
               aria-hidden="true">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8"  y1="2" x2="8"  y2="6"/>
            <line x1="3"  y1="10" x2="21" y2="10"/>
          </svg>
          Timetable <strong>Planner</strong>
        </a>

        <span class="app-timetable-name" id="page-title"></span>

        <div class="app-header-end">
          <a href="admin.html" class="app-header-link" id="back-to-admin">← Editor</a>
          <button class="app-header-link" onclick="window.print()" style="background:none;border:none;cursor:pointer">🖨 Print</button>
          <span class="app-user-name" id="user-name"></span>
          <div class="app-avatar" id="user-avatar" aria-hidden="true"></div>
          <button class="app-btn-signout" onclick="window.signOut()">Sign out</button>
        </div>
      </header>

      <!-- Day selector + filter + zoom controls -->
      <div class="app-controls-bar">
        <div id="filterStaffWrapper"></div>
        <div class="day-selector" id="daySelector"></div>
        <div class="view-controls" id="viewControls"></div>
      </div>

    </div><!-- /.app-shell -->

    <div class="container">
      <div class="timetable-section">

        <div class="timetable-wrapper" id="timetableWrapper">
          <div class="timetable-zoom" id="timetableZoom">
            <div id="timetableContainer">
              <div class="empty-state" style="padding: 4rem 2rem">
                <div class="empty-state-icon">📋</div>
                <p>Loading timetable...</p>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script>
      renderFilterDropdown(document.getElementById('filterStaffWrapper'));
      renderDaySelector(document.getElementById('daySelector'));
      renderViewControls(document.getElementById('viewControls'));
    </script>

    <!-- View JavaScript -->
    <script src="js/view.js"></script>
    <script src="js/view-controls.js"></script>
  </body>
</html>
