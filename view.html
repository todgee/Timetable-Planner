<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timetable Planner - View</title>

    <!-- PWA Configuration -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#2c5f4f" />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=Work+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/dark-theme.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="css/view.css" />

    <!-- Shared utilities -->
    <script src="js/shared.js"></script>
    <script src="theme-loader.js"></script>
  </head>
  <body>
    <!-- Animated orb background -->
    <div class="view-bg" aria-hidden="true"></div>

    <div class="container">
      <header>
        <h1>Timetable Planner</h1>
        <p class="subtitle">Read-only view</p>
        <div class="view-header-nav">
          <a href="admin.html" class="btn btn-secondary btn-icon">Back to Editor</a>
        </div>
      </header>

      <!-- Timetable Section -->
      <div class="timetable-section">
        <div class="timetable-header">
          <h2 class="panel-title">
            <span class="panel-icon">📅</span>
            Weekly Timetable
          </h2>
          <div class="timetable-actions">
            <button class="btn btn-secondary btn-icon" onclick="window.print()">
              Print Timetable
            </button>
          </div>
        </div>

        <!-- Day Selector + View Controls row -->
        <div class="day-controls-row">

          <!-- Filter Staff -->
          <div id="filterStaffWrapper">
            <button class="filter-staff-btn" id="filterStaffBtn" onclick="toggleFilterDropdown()">
              ⊟ Filter Staff<span class="toolbar-badge" id="filterBadge" style="display:none; margin-left:0.35rem;"></span>
            </button>
            <div id="filterDropdown" class="filter-dropdown">
              <div class="filter-dropdown-header">
                <button class="filter-dropdown-btn" onclick="filterSelectAll()">Select All</button>
                <button class="filter-dropdown-btn" onclick="filterClearAll()">Clear</button>
              </div>
              <div class="filter-people-list" id="filterPeopleList"></div>
              <div class="filter-dropdown-footer">
                <button class="filter-apply-btn" onclick="applyFilter()">Apply</button>
              </div>
            </div>
          </div>

          <div class="day-selector" id="daySelector">
            <button class="day-btn active" data-day="monday" onclick="switchDay('monday')">Monday</button>
            <button class="day-btn" data-day="tuesday" onclick="switchDay('tuesday')">Tuesday</button>
            <button class="day-btn" data-day="wednesday" onclick="switchDay('wednesday')">Wednesday</button>
            <button class="day-btn" data-day="thursday" onclick="switchDay('thursday')">Thursday</button>
            <button class="day-btn" data-day="friday" onclick="switchDay('friday')">Friday</button>
          </div>

          <!-- View Controls -->
          <div class="view-controls" id="viewControls">
            <div class="view-controls-group">
              <button type="button" class="view-control-btn" id="scrollLeftBtn" title="Scroll left" aria-label="Scroll timetable left">&#x2039;</button>
              <button type="button" class="view-control-btn" id="scrollRightBtn" title="Scroll right" aria-label="Scroll timetable right">&#x203A;</button>
            </div>
            <div class="view-controls-group view-controls-zoom">
              <button type="button" class="view-control-btn" id="zoomOutBtn" title="Zoom out" aria-label="Zoom out">&minus;</button>
              <span class="view-controls-zoom-value" id="zoomValue" title="Click to reset zoom">100%</span>
              <button type="button" class="view-control-btn" id="zoomInBtn" title="Zoom in" aria-label="Zoom in">+</button>
            </div>
            <div class="view-controls-group">
              <button type="button" class="view-control-btn" id="fullscreenBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
                <span class="fullscreen-icon-enter">⛶</span>
                <span class="fullscreen-icon-exit">✕</span>
              </button>
            </div>
          </div>
        </div><!-- end day+controls row -->

        <div class="timetable-wrapper" id="timetableWrapper">
          <div class="timetable-zoom" id="timetableZoom">
            <div id="timetableContainer">
              <div class="empty-state" style="padding: 4rem 2rem">
                <div class="empty-state-icon">📋</div>
                <p>Loading timetable...</p>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- View JavaScript -->
    <script src="js/view.js"></script>
    <script src="js/view-controls.js"></script>
  </body>
</html>
